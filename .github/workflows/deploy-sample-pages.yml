name: Deploy Sample Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-sample-pages.yml"
      - "examples/mnist-sample/**"
      - "scripts/export_marimo_wasm.py"
      - "scripts/generate_marimo_report.py"
      - "marimo_viewer/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build sample marimo site
        run: make sample-build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: marimo_viewer/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
